本\ncat > files/usr/bin/sysinfo.sh <<'EOF'\n#!/bin/sh\n\necho \"==============================================\"\necho \"System Information\"\necho \"==============================================\"\necho \"Hostname: $(hostname)\"\necho \"Kernel: $(uname -r)\"\necho \"Architecture: $(uname -m)\"\necho \"Uptime: $(uptime)\"\necho \"Memory:\"\nfree -h\necho \"Disk:\"\ndf -h\necho \"Network Interfaces:\"\nip addr show | grep -E \"^[0-9]+:|inet \"\necho \"==============================================\"\nEOF\nchmod +x files/usr/bin/sysinfo.sh\n\n# 添加中国地区 NTP 服务器\ncat > files/etc/config/timeserver <<'EOF'\nconfig timeserver 'ntp'\n    list server 'ntp.aliyun.com'\n    list server 'ntp.tencent.com'\n    list server 'ntp.ntsc.ac.cn'\n    list server 'time.windows.com'\n    option enabled '1'\n    option enable_server '0'\nEOF\n\necho \"==============================================\"\necho \"DIY Part 1 Completed\"\necho \"==============================================\"\n"
