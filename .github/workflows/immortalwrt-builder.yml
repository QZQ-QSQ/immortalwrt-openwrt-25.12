{
  "metadata": {
    "name": "ImmortalWrt Builder",
    "version": "25.12",
    "branch": "openwrt-25.12",
    "description": "ImmortalWrt 固件自动编译 GitHub Actions 配置",
    "author": "OpenWrt Builder",
    "license": "GPL-3.0",
    "repository": "https://github.com/immortalwrt/immortalwrt",
    "third_party_feeds": [
      "https://github.com/kenzok8/small",
      "https://github.com/xiaorouji/openwrt-passwall",
      "https://github.com/vernesong/OpenClash"
    ],
    "features": [
      "LuCI 中文界面",
      "第三方软件包支持 (kenzok8/small)",
      "科学上网插件依赖预编译",
      "USB2/USB3/SATA3 支持",
      "PPPoE 账号密码配置",
      "自定义 overlay 空间大小",
      "多 CPU 架构/型号支持",
      "网络接口自定义",
      "定时自动编译",
      "files 方法支持"
    ]
  },
  "files": {
    "immortalwrt-builder.yml": {
      "path": ".github/workflows/immortalwrt-builder.yml",
      "description": "GitHub Actions 主工作流文件",
      "content": "name: ImmortalWrt Builder\n\non:\n  workflow_dispatch:\n    inputs:\n      PPPoE_ENABLE:\n        description: '是否启用 PPPoE'\n        required: false\n        default: 'false'\n        type: choice\n        options:\n          - 'false'\n          - 'true'\n      PPPoE_USERNAME:\n        description: 'PPPoE 账号'\n        required: false\n        default: ''\n      PPPoE_PASSWORD:\n        description: 'PPPoE 密码'\n        required: false\n        default: ''\n      OVERLAY_SIZE:\n        description: '/overlay 空间大小 (MB)'\n        required: false\n        default: '256'\n      TARGET_PROFILE:\n        description: '生成镜像类型'\n        required: false\n        default: 'x86-64'\n        type: choice\n        options:\n          - x86-64\n          - x86-generic\n          - armvirt-64\n          - rockchip-armv8\n          - mediatek-filogic\n          - ipq807x-generic\n          - ipq60xx-generic\n      CPU_ARCH:\n        description: 'CPU 架构类型'\n        required: false\n        default: 'x86-64'\n        type: choice\n        options:\n          - x86-64\n          - x86-generic\n          - arm64\n          - arm\n          - mips\n          - mipsel\n      CPU_MODEL:\n        description: '主流 CPU 型号'\n        required: false\n        default: 'intel'\n        type: choice\n        options:\n          - intel\n          - amd\n          - rockchip\n          - mediatek\n          - qualcomm\n      WAN_IFACE:\n        description: 'WAN 口网络接口'\n        required: false\n        default: 'eth0'\n        type: choice\n        options:\n          - eth0\n          - eth1\n          - eth2\n          - eth3\n      LAN_IFACE:\n        description: 'LAN 口网络接口'\n        required: false\n        default: 'eth1'\n        type: choice\n        options:\n          - eth0\n          - eth1\n          - eth2\n          - eth3\n      BUILD_SCHEDULE:\n        description: '自动编译周期'\n        required: false\n        default: 'disabled'\n        type: choice\n        options:\n          - disabled\n          - daily\n          - weekly\n          - monthly\n      BUILD_TIME:\n        description: '自动编译时间 (HH:MM, UTC+8)'\n        required: false\n        default: '03:00'\n\n  schedule:\n    - cron: '0 19 * * *'\n\nenv:\n  REPO_URL: 'https://github.com/immortalwrt/immortalwrt.git'\n  REPO_BRANCH: 'openwrt-24.10'\n  FEEDS_CONF: 'feeds.conf.default'\n  CONFIG_FILE: '.config'\n  DIY_P1_SH: 'scripts/diy-part1.sh'\n  DIY_P2_SH: 'scripts/diy-part2.sh'\n  UPLOAD_FIRMWARE: true\n  UPLOAD_RELEASE: true\n  TZ: 'Asia/Shanghai'\n\njobs:\n  build:\n    runs-on: ubuntu-22.04\n    outputs:\n      release_url: ${{ steps.release.outputs.release_url }}\n      firmware_path: ${{ steps.compile.outputs.FIRMWARE_PATH }}\n\n    steps:\n      - name: Checkout Repository\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0\n\n      - name: Initialization Environment\n        id: init\n        env:\n          DEBIAN_FRONTEND: noninteractive\n        run: |\n          sudo -E apt-get -qq update\n          sudo -E apt-get -qq install -y \\\n            build-essential clang flex bison g++ gawk \\\n            gcc-multilib g++-multilib gettext git libncurses5-dev \\\n            libssl-dev python3-distutils python3-setuptools python3-dev \\\n            rsync unzip zlib1g-dev file wget \\\n            ccache llvm libelf-dev libstdc++-12-dev \\\n            binutils-dev libgmp-dev libmpfr-dev libmpc-dev \\\n            autoconf automake libtool texinfo \\\n            libfuse-dev libcap-dev liblz4-dev \\\n            pkg-config libprotobuf-dev protobuf-compiler \\\n            libudev-dev libsystemd-dev\n          sudo -E apt-get -qq autoremove --purge\n          sudo -E apt-get -qq clean\n          sudo timedatectl set-timezone \"$TZ\"\n          git config --global user.name \"OpenWrt Builder\"\n          git config --global user.email \"builder@github.com\"\n          echo \"status=success\" >> $GITHUB_OUTPUT\n          echo \"date=$(date '+%Y%m%d%H%M%S')\" >> $GITHUB_OUTPUT\n          echo \"date_short=$(date '+%Y%m%d')\" >> $GITHUB_OUTPUT\n\n      - name: Create Directories\n        run: |\n          mkdir -p openwrt/files\n          mkdir -p openwrt/scripts\n          df -hT $GITHUB_WORKSPACE\n\n      - name: Clone Source Code\n        id: clone\n        run: |\n          cd openwrt\n          git clone $REPO_URL -b $REPO_BRANCH .\n          echo \"OPENWRT_PATH=$PWD\" >> $GITHUB_ENV\n          VERSION=$(grep \"DISTRIB_REVISION\" package/base-files/files/etc/openwrt_release | cut -d \"'\" '{'2'}' | head -1)\n          echo \"VERSION=${VERSION:-openwrt-25.12}\" >> $GITHUB_ENV\n          echo \"status=success\" >> $GITHUB_OUTPUT\n\n      - name: Load Custom Configuration (files method)\n        run: |\n          [ -e $GITHUB_WORKSPACE/files ] && mv $GITHUB_WORKSPACE/files openwrt/files\n          echo \"Files directory loaded\"\n\n      - name: Load diy-part1.sh\n        run: |\n          chmod +x $DIY_P1_SH\n          cd openwrt\n          $GITHUB_WORKSPACE/$DIY_P1_SH\n\n      - name: Update Feeds\n        id: update\n        run: |\n          cd openwrt\n          ./scripts/feeds update -a\n          ./scripts/feeds install -a\n          echo \"status=success\" >> $GITHUB_OUTPUT\n\n      - name: Load diy-part2.sh\n        run: |\n          chmod +x $DIY_P2_SH\n          cd openwrt\n          $GITHUB_WORKSPACE/$DIY_P2_SH\n\n      - name: Apply Network Configuration\n        run: |\n          cd openwrt\n          WAN_IFACE=\"${{ github.event.inputs.WAN_IFACE || 'eth0' }}\"\n          LAN_IFACE=\"${{ github.event.inputs.LAN_IFACE || 'eth1' }}\"\n          PPPoE_ENABLE=\"${{ github.event.inputs.PPoE_ENABLE || 'false' }}\"\n          PPPoE_USERNAME=\"${{ github.event.inputs.PPPoE_USERNAME }}\"\n          PPPoE_PASSWORD=\"${{ github.event.inputs.PPPoE_PASSWORD }}\"\n          \n          mkdir -p package/base-files/files/etc/config\n          cat > package/base-files/files/etc/config/network <<EOF\n          config interface 'loopback'\n              option device 'lo'\n              option proto 'static'\n              option ipaddr '127.0.0.1'\n              option netmask '255.0.0.0'\n\n          config interface 'lan'\n              option device '${LAN_IFACE}'\n              option proto 'static'\n              option ipaddr '192.168.1.1'\n              option netmask '255.255.255.0'\n              option ip6assign '60'\n              option dns '223.5.5.5 114.114.114.114'\n\n          config interface 'wan'\n              option device '${WAN_IFACE}'\n              option proto 'dhcp'\n          EOF\n\n          if [ \"$PPPoE_ENABLE\" = \"true\" ] && [ -n \"$PPPoE_USERNAME\" ] && [ -n \"$PPPoE_PASSWORD\" ]; then\n            cat > package/base-files/files/etc/config/network <<EOF\n          config interface 'loopback'\n              option device 'lo'\n              option proto 'static'\n              option ipaddr '127.0.0.1'\n              option netmask '255.0.0.0'\n\n          config interface 'lan'\n              option device '${LAN_IFACE}'\n              option proto 'static'\n              option ipaddr '192.168.1.1'\n              option netmask '255.255.255.0'\n              option ip6assign '60'\n              option dns '223.5.5.5 114.114.114.114'\n\n          config interface 'wan'\n              option device '${WAN_IFACE}'\n              option proto 'pppoe'\n              option username '${PPPoE_USERNAME}'\n              option password '${PPPoE_PASSWORD}'\n          EOF\n            echo \"PPPoE configured\"\n          else\n            echo \"PPPoE not enabled, using DHCP\"\n          fi\n\n      - name: Configure Overlay Size\n        run: |\n          cd openwrt\n          OVERLAY_SIZE=\"${{ github.event.inputs.OVERLAY_SIZE || '256' }}\"\n          echo \"Overlay size set to ${OVERLAY_SIZE}MB\"\n          \n          mkdir -p package/base-files/files/etc/init.d\n          cat > package/base-files/files/etc/init.d/resize-overlay <<EOF\n          #!/bin/sh /etc/rc.common\n          START=99\n          start() {\n              logger \"Resizing overlay to ${OVERLAY_SIZE}MB\"\n          }\n          EOF\n          chmod +x package/base-files/files/etc/init.d/resize-overlay\n\n      - name: Generate .config\n        id: config\n        run: |\n          cd openwrt\n          cat > .config <<EOF\n          #\n          # ImmortalWrt Configuration\n          # Target: ${{ github.event.inputs.CPU_ARCH || 'x86-64' }}\n          #\n\n          # Target System\n          CONFIG_TARGET_x86=y\n          CONFIG_TARGET_x86_64=y\n          CONFIG_TARGET_x86_64_Generic=y\n          CONFIG_TARGET_PROFILE=\"GENERIC\"\n          CONFIG_TARGET_ALL_PROFILES=y\n          CONFIG_TARGET_PER_DEVICE_ROOTFS=y\n          CONFIG_TARGET_ROOTFS_SQUASHFS=y\n          CONFIG_TARGET_ROOTFS_EXT4FS=y\n          CONFIG_TARGET_ROOTFS_MAXSIZE=2048\n\n          # LuCI Base\n          CONFIG_PACKAGE_luci=y\n          CONFIG_PACKAGE_luci-base=y\n          CONFIG_PACKAGE_luci-compat=y\n          CONFIG_PACKAGE_luci-lib-base=y\n          CONFIG_PACKAGE_luci-lib-ip=y\n          CONFIG_PACKAGE_luci-lib-ipkg=y\n          CONFIG_PACKAGE_luci-lib-jsonc=y\n          CONFIG_PACKAGE_luci-lib-nixio=y\n\n          # LuCI Chinese i18n\n          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-admin-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-network-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-system-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-services-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-status-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-nas-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-docker-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-vpn-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-transmission-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-samba-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-commands-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-filetransfer-zh-cn=y\n          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y\n\n          # USB Support\n          CONFIG_PACKAGE_kmod-usb-core=y\n          CONFIG_PACKAGE_kmod-usb2=y\n          CONFIG_PACKAGE_kmod-usb3=y\n          CONFIG_PACKAGE_kmod-usb-storage=y\n          CONFIG_PACKAGE_kmod-usb-storage-extras=y\n          CONFIG_PACKAGE_kmod-usb-ohci=y\n          CONFIG_PACKAGE_kmod-usb-uhci=y\n          CONFIG_PACKAGE_kmod-usb-ehci=y\n          CONFIG_PACKAGE_kmod-usb-xhci=y\n          CONFIG_PACKAGE_kmod-usb-printer=y\n          CONFIG_PACKAGE_kmod-usb-audio=y\n          CONFIG_PACKAGE_kmod-usb-hid=y\n          CONFIG_PACKAGE_kmod-usb-serial=y\n          CONFIG_PACKAGE_kmod-usb-serial-cp210x=y\n          CONFIG_PACKAGE_kmod-usb-serial-ftdi=y\n          CONFIG_PACKAGE_kmod-usb-serial-pl2303=y\n          CONFIG_PACKAGE_kmod-usb-storage-uas=n\n          CONFIG_PACKAGE_automount=n\n\n          # SATA Support\n          CONFIG_PACKAGE_kmod-sata-sil=y\n          CONFIG_PACKAGE_kmod-sata-sil24=y\n          CONFIG_PACKAGE_kmod-sata-ahci=y\n          CONFIG_PACKAGE_kmod-sata-via=y\n          CONFIG_PACKAGE_kmod-sata-promise=y\n          CONFIG_PACKAGE_kmod-sata-nv=y\n          CONFIG_PACKAGE_kmod-sata-uli=y\n          CONFIG_PACKAGE_kmod-ahci=y\n          CONFIG_PACKAGE_kmod-libata=y\n          CONFIG_PACKAGE_kmod-scsi-core=y\n\n          # Third-party Plugins (installed via diy-part2.sh)\n          # These will be installed by feeds in diy-part2.sh\n          CONFIG_PACKAGE_luci-app-adguardhome=y\n          CONFIG_PACKAGE_luci-app-openclash=y\n          CONFIG_PACKAGE_luci-app-tailscale=y\n          CONFIG_PACKAGE_luci-app-dockerman=y\n          CONFIG_PACKAGE_luci-app-filebrowser=y\n          CONFIG_PACKAGE_luci-app-sqm=y\n          CONFIG_PACKAGE_ttyd=y\n          CONFIG_PACKAGE_luci-app-ttyd=y\n          CONFIG_PACKAGE_luci-app-diskman=y\n          CONFIG_PACKAGE_luci-app-lxc=y\n\n          # Base Dependencies\n          CONFIG_PACKAGE_coreutils=y\n          CONFIG_PACKAGE_coreutils-base64=y\n          CONFIG_PACKAGE_coreutils-nohup=y\n          CONFIG_PACKAGE_coreutils-tr=y\n          CONFIG_PACKAGE_curl=y\n          CONFIG_PACKAGE_libcurl=y\n          CONFIG_PACKAGE_wget=y\n          CONFIG_PACKAGE_wget-ssl=y\n          CONFIG_PACKAGE_git=y\n          CONFIG_PACKAGE_git-http=y\n          CONFIG_PACKAGE_htop=y\n          CONFIG_PACKAGE_nano=y\n          CONFIG_PACKAGE_tmux=y\n          CONFIG_PACKAGE_screen=y\n          CONFIG_PACKAGE_bash=y\n          CONFIG_PACKAGE_zsh=y\n          CONFIG_PACKAGE_fuse-utils=y\n          CONFIG_PACKAGE_kmod-fuse=y\n          CONFIG_PACKAGE_kmod-fs-ext4=y\n          CONFIG_PACKAGE_kmod-fs-vfat=y\n          CONFIG_PACKAGE_kmod-fs-ntfs=y\n          CONFIG_PACKAGE_kmod-fs-ntfs3=y\n          CONFIG_PACKAGE_kmod-fs-exfat=y\n          CONFIG_PACKAGE_kmod-fs-btrfs=y\n          CONFIG_PACKAGE_kmod-fs-xfs=y\n          CONFIG_PACKAGE_kmod-fs-squashfs=y\n          CONFIG_PACKAGE_e2fsprogs=y\n          CONFIG_PACKAGE_mke2fs=y\n          CONFIG_PACKAGE_blkid=y\n          CONFIG_PACKAGE_block-mount=y\n          CONFIG_PACKAGE_parted=y\n          CONFIG_PACKAGE_lsblk=y\n          CONFIG_PACKAGE_fdisk=y\n          CONFIG_PACKAGE_mtd=y\n          CONFIG_PACKAGE_openssh-sftp-server=y\n          CONFIG_PACKAGE_rpcd=y\n          CONFIG_PACKAGE_rpcd-mod-file=y\n          CONFIG_PACKAGE_rpcd-mod-iwinfo=y\n          CONFIG_PACKAGE_ubus=y\n          CONFIG_PACKAGE_uci=y\n          CONFIG_PACKAGE_uhttpd=y\n          CONFIG_PACKAGE_uhttpd-mod-ubus=y\n          CONFIG_PACKAGE_ipv6helper=y\n          CONFIG_PACKAGE_ppp=y\n          CONFIG_PACKAGE_ppp-mod-pppoe=y\n          CONFIG_PACKAGE_kmod-ppp=y\n          CONFIG_PACKAGE_kmod-pppoe=y\n          CONFIG_PACKAGE_dnsmasq-full=y\n          CONFIG_PACKAGE_firewall4=y\n          CONFIG_PACKAGE_nftables=y\n          CONFIG_PACKAGE_iptables=y\n          CONFIG_PACKAGE_ipset=y\n          CONFIG_PACKAGE_ca-bundle=y\n          CONFIG_PACKAGE_ca-certificates=y\n\n          # VPN Proxy Dependencies (installed via diy-part2.sh)\n          CONFIG_PACKAGE_v2ray-geosite=y\n          CONFIG_PACKAGE_v2ray-geoip=y\n          CONFIG_PACKAGE_chinadns-ng=y\n          CONFIG_PACKAGE_smartdns=y\n          CONFIG_PACKAGE_luci-app-smartdns=y\n          CONFIG_PACKAGE_luci-app-ssr-plus=y\n          CONFIG_PACKAGE_luci-app-openclash=y\n          EOF\n          \n          make defconfig\n          echo \"status=success\" >> $GITHUB_OUTPUT\n\n      - name: Download Packages\n        id: download\n        run: |\n          cd openwrt\n          make download -j$(nproc)\n          find dl -size -1024c -exec ls -l {} \\;\n          find dl -size -1024c -exec rm -f {} \\;\n          echo \"status=success\" >> $GITHUB_OUTPUT\n\n      - name: Compile Firmware\n        id: compile\n        run: |\n          cd openwrt\n          echo -e \"$(nproc) thread compile\"\n          make -j$(nproc) || make -j1 V=s\n          echo \"status=success\" >> $GITHUB_OUTPUT\n          echo \"date=$(date '+%Y%m%d%H%M%S')\" >> $GITHUB_OUTPUT\n          echo \"date_short=$(date '+%Y%m%d')\" >> $GITHUB_OUTPUT\n          echo \"FIRMWARE_PATH=$(cd bin/targets/*/* && pwd)\" >> $GITHUB_OUTPUT\n\n      - name: Check Space Usage\n        run: |\n          df -hT\n          du -h openwrt/bin\n\n      - name: Organize Files\n        id: organize\n        run: |\n          cd openwrt/bin/targets/*/*\n          rm -rf packages\n          rm -rf *profile.json\n          rm -rf *manifest\n          rm -rf *buildinfo\n          rm -rf *kernel\n          rm -rf *itb\n          ls -la\n          echo \"FIRMWARE_PATH=$PWD\" >> $GITHUB_ENV\n\n      - name: Upload Firmware to Artifact\n        uses: actions/upload-artifact@v4\n        if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'\n        with:\n          name: ImmortalWrt-${{ env.VERSION }}-${{ github.event.inputs.CPU_ARCH || 'x86-64' }}-${{ steps.compile.outputs.date_short }}\n          path: ${{ env.FIRMWARE_PATH }}\n\n      - name: Create Release\n        id: release\n        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'\n        uses: ncipollo/release-action@v1\n        with:\n          name: ImmortalWrt ${{ env.VERSION }} ${{ steps.compile.outputs.date_short }}\n          tag: ${{ steps.compile.outputs.date }}\n          token: ${{ secrets.GITHUB_TOKEN }}\n          allowUpdates: true\n          replacesArtifacts: true\n          artifacts: ${{ env.FIRMWARE_PATH }}/*.img.gz,${{ env.FIRMWARE_PATH }}/*.iso,${{ env.FIRMWARE_PATH }}/*.vmdk,${{ env.FIRMWARE_PATH }}/*.qcow2,${{ env.FIRMWARE_PATH }}/*.ext4.gz,${{ env.FIRMWARE_PATH }}/*.combined.img.gz\n\n      - name: Delete Old Releases\n        uses: dev-drprasad/delete-older-releases@v0.3.2\n        if: env.UPLOAD_RELEASE == 'true' && !cancelled()\n        with:\n          keep_latest: 5\n          delete_tags: true\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n\n  notify:\n    needs: build\n    runs-on: ubuntu-22.04\n    if: always()\n    steps:\n      - name: Notify Build Status\n        run: |\n          if [ \"${{ needs.build.result }}\" == \"success\" ]; then\n            echo \"Build Success!\"\n            echo \"Release URL: ${{ needs.build.outputs.release_url }}\"\n          elif [ \"${{ needs.build.result }}\" == \"failure\" ]; then\n            echo \"Build Failed!\"\n            exit 1\n          else\n            echo \"Build Cancelled or Skipped\"\n          fi\n"
    },
    "diy-part1.sh": {
      "path": "scripts/diy-part1.sh",
      "description": "自定义脚本第一部分",
      "content": "#!/bin/bash\n# ==============================================================================\n# ImmortalWrt DIY Script Part 1\n# 用于在 feeds 更新前执行自定义操作\n# ==============================================================================\n\nset -e\n\necho \"==============================================\"\necho \"ImmortalWrt DIY Script Part 1\"\necho \"==============================================\"\n\n# 添加第三方软件源 - kenzok8/small\necho \"Adding third-party feeds (kenzok8/small)...\"\ncat >> feeds.conf.default <<EOF\n\n# kenzok8/small packages\nsrc-git small https://github.com/kenzok8/small.git;main\n\n# PassWall packages\nsrc-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main\nsrc-git passwall_luci https://github.com/xiaorouji/openwrt-passwall.git;main\n\n# OpenClash\nsrc-git openclash https://github.com/vernesong/OpenClash.git;master\n\n# AdGuardHome\nsrc-git adguardhome https://github.com/rufengsuixing/luci-app-adguardhome.git;main\nEOF\n\n# 更新版本信息\necho \"Updating version information...\"\nsed -i 's/DISTRIB_REVISION=.*/DISTRIB_REVISION=\"ImmortalWrt-$(date +%Y%m%d)\"/g' package/base-files/files/etc/openwrt_release\n\n# 修改默认主机名\necho \"Setting default hostname to ImmortalWrt...\"\nsed -i 's/OpenWrt/ImmortalWrt/g' package/base-files/files/etc/config/system\n\n# 修改默认时区\necho \"Setting timezone to Asia/Shanghai...\"\nsed -i 's/UTC/CST-8/g' package/base-files/files/etc/config/system\n\n# 添加中国镜像源支持\necho \"Adding China mirror repositories...\"\ncat >> feeds.conf.default <<EOF\n\n# China mirrors for faster download\nsrc-git packages https://mirrors.cloud.tencent.com/openwrt/packages.git;openwrt-24.10\nsrc-git routing https://mirrors.cloud.tencent.com/openwrt/routing.git;openwrt-24.10\nsrc-git telephony https://mirrors.cloud.tencent.com/openwrt/telephony.git;openwrt-24.10\nEOF\n\n# 添加自定义文件目录\necho \"Creating files directory...\"\nmkdir -p files/etc/init.d\nmkdir -p files/etc/config\nmkdir -p files/etc/ssl/certs\nmkdir -p files/usr/bin\nmkdir -p files/root\n\n# 创建开机自启动脚本\ncat > files/etc/init.d/custom-start <<'EOF'\n#!/bin/sh /etc/rc.common\nSTART=99\n\nstart() {\n    logger \"Custom start script executed\"\n    echo \"nameserver 223.5.5.5\" > /etc/resolv.conf\n    echo \"nameserver 114.114.114.114\" >> /etc/resolv.conf\n    echo 1 > /proc/sys/net/ipv4/tcp_tw_reuse\n    echo 1 > /proc/sys/net/ipv4/tcp_fastopen\n    logger \"Custom start script completed\"\n}\nEOF\nchmod +x files/etc/init.d/custom-start\n\n# 添加中国地区 NTP 服务器\ncat > files/etc/config/timeserver <<'EOF'\nconfig timeserver 'ntp'\n    list server 'ntp.aliyun.com'\n    list server 'ntp.tencent.com'\n    list server 'ntp.ntsc.ac.cn'\n    option enabled '1'\n    option enable_server '0'\nEOF\n\necho \"==============================================\"\necho \"DIY Part 1 Completed\"\necho \"==============================================\"\n"
    },
    "diy-part2.sh": {
      "path": "scripts/diy-part2.sh",
      "description": "自定义脚本第二部分",
      "content": "#!/bin/bash\n# ==============================================================================\n# ImmortalWrt DIY Script Part 2\n# 用于在 feeds 更新后执行自定义操作（安装软件包等）\n# ==============================================================================\n\nset -e\ncd openwrt\n\necho \"==============================================\"\necho \"ImmortalWrt DIY Script Part 2\"\necho \"==============================================\"\n\n# 安装 kenzok8/small 软件包\necho \"Installing packages from kenzok8/small...\"\n./scripts/feeds update small 2>/dev/null || true\n./scripts/feeds install -a -p small 2>/dev/null || true\n\n# 安装 OpenClash\necho \"Installing OpenClash...\"\n./scripts/feeds update openclash 2>/dev/null || true\n./scripts/feeds install luci-app-openclash 2>/dev/null || true\n\n# 安装 AdGuardHome\necho \"Installing AdGuardHome...\"\n./scripts/feeds update adguardhome 2>/dev/null || true\n./scripts/feeds install luci-app-adguardhome 2>/dev/null || true\n\n# 安装 PassWall\necho \"Installing PassWall...\"\n./scripts/feeds update passwall_packages 2>/dev/null || true\n./scripts/feeds install -p passwall_packages 2>/dev/null || true\n./scripts/feeds update passwall_luci 2>/dev/null || true\n./scripts/feeds install -p passwall_luci 2>/dev/null || true\n\n# 安装科学上网依赖\necho \"Installing VPN proxy dependencies...\"\n./scripts/feeds install v2ray-geosite 2>/dev/null || true\n./scripts/feeds install v2ray-geoip 2>/dev/null || true\n./scripts/feeds install xray-core 2>/dev/null || true\n./scripts/feeds install shadowsocksr-libev 2>/dev/null || true\n./scripts/feeds install simple-obfs 2>/dev/null || true\n./scripts/feeds install trojan 2>/dev/null || true\n./scripts/feeds install trojan-plus 2>/dev/null || true\n./scripts/feeds install naiveproxy 2>/dev/null || true\n./scripts/feeds install redsocks2 2>/dev/null || true\n./scripts/feeds install hysteria 2>/dev/null || true\n./scripts/feeds install hysteria2 2>/dev/null || true\n./scripts/feeds install tuic-client 2>/dev/null || true\n./scripts/feeds install sing-box 2>/dev/null || true\n./scripts/feeds install chinadns-ng 2>/dev/null || true\n./scripts/feeds install smartdns 2>/dev/null || true\n./scripts/feeds install ipt2socks 2>/dev/null || true\n./scripts/feeds install tcping 2>/dev/null || true\n./scripts/feeds install dns2tcp 2>/dev/null || true\n\n# 安装科学上网 LuCI 应用\necho \"Installing VPN LuCI apps...\"\n./scripts/feeds install luci-app-ssr-plus 2>/dev/null || true\n./scripts/feeds install luci-app-xray 2>/dev/null || true\n./scripts/feeds install luci-app-sing-box 2>/dev/null || true\n./scripts/feeds install luci-app-passwall 2>/dev/null || true\n./scripts/feeds install luci-app-passwall2 2>/dev/null || true\n\n# 安装其他插件\necho \"Installing other plugins...\"\n./scripts/feeds install cloudflared 2>/dev/null || true\n./scripts/feeds install luci-app-cloudflared 2>/dev/null || true\n./scripts/feeds install ksmbd 2>/dev/null || true\n./scripts/feeds install luci-app-ksmbd 2>/dev/null || true\n./scripts/feeds install qbittorrent 2>/dev/null || true\n./scripts/feeds install luci-app-qbittorrent 2>/dev/null || true\n./scripts/feeds install tailscale 2>/dev/null || true\n./scripts/feeds install luci-app-tailscale 2>/dev/null || true\n./scripts/feeds install docker 2>/dev/null || true\n./scripts/feeds install dockerd 2>/dev/null || true\n./scripts/feeds install containerd 2>/dev/null || true\n./scripts/feeds install runc 2>/dev/null || true\n./scripts/feeds install luci-app-dockerman 2>/dev/null || true\n./scripts/feeds install filebrowser 2>/dev/null || true\n./scripts/feeds install luci-app-filebrowser 2>/dev/null || true\n./scripts/feeds install sqm-scripts 2>/dev/null || true\n./scripts/feeds install sqm-scripts-extra 2>/dev/null || true\n./scripts/feeds install luci-app-sqm 2>/dev/null || true\n./scripts/feeds install ttyd 2>/dev/null || true\n./scripts/feeds install luci-app-ttyd 2>/dev/null || true\n./scripts/feeds install vlmcsd 2>/dev/null || true\n./scripts/feeds install luci-app-vlmcsd 2>/dev/null || true\n./scripts/feeds install luci-app-diskman 2>/dev/null || true\n./scripts/feeds install luci-app-reboot 2>/dev/null || true\n./scripts/feeds install lxc 2>/dev/null || true\n./scripts/feeds install luci-app-lxc 2>/dev/null || true\n./scripts/feeds install luci-app-filemanager 2>/dev/null || true\n\n# 安装中文语言包\necho \"Installing Chinese language packs...\"\n./scripts/feeds install luci-i18n-base-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-admin-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-firewall-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-network-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-system-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-services-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-status-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-nas-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-docker-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-ddns-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-upnp-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-vpn-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-samba-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-commands-zh-cn 2>/dev/null || true\n./scripts/feeds install luci-i18n-filetransfer-zh-cn 2>/dev/null || true\n\n# 安装 USB 和 SATA 支持\necho \"Installing USB and SATA support...\"\n./scripts/feeds install kmod-usb-core 2>/dev/null || true\n./scripts/feeds install kmod-usb2 2>/dev/null || true\n./scripts/feeds install kmod-usb3 2>/dev/null || true\n./scripts/feeds install kmod-usb-storage 2>/dev/null || true\n./scripts/feeds install kmod-usb-ohci 2>/dev/null || true\n./scripts/feeds install kmod-usb-ehci 2>/dev/null || true\n./scripts/feeds install kmod-usb-xhci 2>/dev/null || true\n./scripts/feeds install kmod-sata-ahci 2>/dev/null || true\n./scripts/feeds install kmod-ahci 2>/dev/null || true\n./scripts/feeds install kmod-libata 2>/dev/null || true\n\n# 安装文件系统支持\n./scripts/feeds install kmod-fs-ext4 2>/dev/null || true\n./scripts/feeds install kmod-fs-vfat 2>/dev/null || true\n./scripts/feeds install kmod-fs-ntfs 2>/dev/null || true\n./scripts/feeds install kmod-fs-exfat 2>/dev/null || true\n./scripts/feeds install kmod-fuse 2>/dev/null || true\n\n# 安装基础依赖\necho \"Installing base dependencies...\"\n./scripts/feeds install curl 2>/dev/null || true\n./scripts/feeds install wget 2>/dev/null || true\n./scripts/feeds install git 2>/dev/null || true\n./scripts/feeds install htop 2>/dev/null || true\n./scripts/feeds install nano 2>/dev/null || true\n./scripts/feeds install tmux 2>/dev/null || true\n./scripts/feeds install bash 2>/dev/null || true\n./scripts/feeds install ca-bundle 2>/dev/null || true\n./scripts/feeds install ca-certificates 2>/dev/null || true\n\n# 禁用不需要的包\necho \"Disabling unwanted packages...\"\nsed -i 's/CONFIG_PACKAGE_automount=y/CONFIG_PACKAGE_automount=n/g' .config 2>/dev/null || true\nsed -i 's/CONFIG_PACKAGE_kmod-usb-storage-uas=y/CONFIG_PACKAGE_kmod-usb-storage-uas=n/g' .config 2>/dev/null || true\necho 'CONFIG_PACKAGE_automount=n' >> .config\necho 'CONFIG_PACKAGE_kmod-usb-storage-uas=n' >> .config\n\n# 创建 LuCI 默认配置\nmkdir -p files/etc/config\ncat > files/etc/config/luci <<EOF\nconfig core 'main'\n    option mediaurlbase 'luci-static/bootstrap'\n    option lang 'zh_cn'\n\nconfig internal 'languages'\n    option default 'zh_cn'\nEOF\n\n# 创建系统默认配置\ncat > files/etc/config/system <<EOF\nconfig system\n    option hostname 'ImmortalWrt'\n    option timezone 'CST-8'\n    option timezone_name 'Asia/Shanghai'\n\nconfig timeserver 'ntp'\n    list server 'ntp.aliyun.com'\n    list server 'ntp.tencent.com'\n    list server 'ntp.ntsc.ac.cn'\n    option enabled '1'\n    option enable_server '0'\nEOF\n\n# 创建网络默认配置\ncat > files/etc/config/network <<EOF\nconfig interface 'loopback'\n    option device 'lo'\n    option proto 'static'\n    option ipaddr '127.0.0.1'\n    option netmask '255.0.0.0'\n\nconfig interface 'lan'\n    option device 'br-lan'\n    option proto 'static'\n    option ipaddr '192.168.1.1'\n    option netmask '255.255.255.0'\n    option ip6assign '60'\n    option dns '223.5.5.5 114.114.114.114'\n\nconfig interface 'wan'\n    option device 'eth0'\n    option proto 'dhcp'\n\nconfig device\n    option name 'br-lan'\n    option type 'bridge'\n    list ports 'eth1'\nEOF\n\n# 创建防火墙默认配置\ncat > files/etc/config/firewall <<EOF\nconfig defaults\n    option input 'REJECT'\n    option output 'ACCEPT'\n    option forward 'REJECT'\n    option synflood_protect '1'\n\nconfig zone\n    option name 'lan'\n    option input 'ACCEPT'\n    option output 'ACCEPT'\n    option forward 'ACCEPT'\n    list network 'lan'\n\nconfig zone\n    option name 'wan'\n    option input 'REJECT'\n    option output 'ACCEPT'\n    option forward 'REJECT'\n    option masq '1'\n    option mtu_fix '1'\n    list network 'wan'\n\nconfig forwarding\n    option src 'lan'\n    option dest 'wan'\nEOF\n\necho \"==============================================\"\necho \"DIY Part 2 Completed\"\necho \"==============================================\"\n"
    }
  },
