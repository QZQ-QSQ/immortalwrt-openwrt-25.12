name: Build ImmortalWrt

on:
  workflow_dispatch:
  schedule:
    - cron: 0 20 * * *

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Init Environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y $(curl -fsSL https://git.io/depends-ubuntu-2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update Feeds
      run: |
        cd openwrt
        echo "src-git small https://github.com/kenzok8/small.git;main" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Install Packages
      run: |
        cd openwrt
        ./scripts/feeds update small
        ./scripts/feeds install -a -p small

    - name: Generate Config
      run: |
        cd openwrt
        cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_Generic=y
CONFIG_TARGET_PROFILE="GENERIC"
CONFIG_TARGET_ALL_PROFILES=y
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_TARGET_ROOTFS_EXT4FS=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_kmod-usb-core=y
CONFIG_PACKAGE_kmod-usb2=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-storage-uas=n
CONFIG_PACKAGE_automount=n
CONFIG_PACKAGE_kmod-sata-ahci=y
CONFIG_PACKAGE_kmod-ahci=y
CONFIG_PACKAGE_kmod-libata=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_kmod-fuse=y
EOF
        make defconfig

    - name: Download
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: Compile
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "date=$(date '+%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

    - name: Upload
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: ImmortalWrt-${{ steps.compile.outputs.date }}
        path: openwrt/bin/targets/*/*/*.img.gz
