编写github action immortalWrt-builder.yml文件，使用immortalwrt源码分支openwrt-25.12，要求如下：
1--luci中文界面
2--添加第三方https://github.com/kenzok8/small的软件包。
3--安装插件AdGuardHome，cloudflared，ksmbd，openclash，
qBittorrent，tailscale，dockerman，filebrowser，sqm，ttyd，vlmcsd，
DiskMan，reboot,lxc,filemanager,daed，如有luci-i18n-*****-zh-cn插件中文luci也要安装
4--支持USB2,USB3,SATA3。
5--luci中文界面。
6--默认取消编译automount，kmod-usb-storage-uas，这两个会造成USB挂载不正常。
7--点击run workflow时，可选是否设置pppoe账号/密码，/overlay空间大小自定义，可选生成镜像类型，可选cpu架构类型，可选主流cpu型号，wan口和lan口可选eth0，
eth1，eth2，eth3.
8--可选自动编译周期或时间。
   参考P3TERX  Actions-OpenWrt，diy-part1.sh，diy-part2.sh等，支持files方法，把插件旧配置编译到固件，添加适合中国大陆习惯使用的luci，插件依赖。。





