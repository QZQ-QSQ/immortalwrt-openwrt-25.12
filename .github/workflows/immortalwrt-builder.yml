#=================================================
# ImmortalWrt Builder
#=================================================

name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      PPPoE_ENABLE:
        description: 'Enable PPPoE'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      PPPoE_USERNAME:
        description: 'PPPoE Username'
        required: false
        default: ''
      PPPoE_PASSWORD:
        description: 'PPPoE Password'
        required: false
        default: ''
      TARGET_PROFILE:
        description: 'Target Profile'
        required: false
        default: 'x86-64'
        type: choice
        options:
          - x86-64
          - x86-generic
          - armvirt-64
      WAN_IFACE:
        description: 'WAN Interface'
        required: false
        default: 'eth0'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      LAN_IFACE:
        description: 'LAN Interface'
        required: false
        default: 'eth1'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3

  schedule:
    - cron: 0 19 * * *

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y $(curl -fsSL https://git.io/depends-ubuntu-2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        git config --global user.name "OpenWrt Builder"
        git config --global user.email "builder@github.com"

    - name: Clone source code
      run: |
        df -hT $GITHUB_WORKSPACE
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/diy-part1.sh 2>/dev/null || true
        $GITHUB_WORKSPACE/scripts/diy-part1.sh 2>/dev/null || true

    - name: Create network config
      run: |
        cd openwrt
        mkdir -p files/etc/config
        cat > files/etc/config/network << NETCONF
config interface 'loopback'
    option device 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'lan'
    option device '${{ github.event.inputs.LAN_IFACE || 'eth1' }}'
    option proto 'static'
    option ipaddr '192.168.1.1'
    option netmask '255.255.255.0'
    option ip6assign '60'
    option dns '223.5.5.5 114.114.114.114'
NETCONF
        if [ "${{ github.event.inputs.PPoE_ENABLE }}" = "true" ] && [ -n "${{ github.event.inputs.PPPoE_USERNAME }}" ]; then
          cat >> files/etc/config/network << WANCONF
config interface 'wan'
    option device '${{ github.event.inputs.WAN_IFACE || 'eth0' }}'
    option proto 'pppoe'
    option username '${{ github.event.inputs.PPPoE_USERNAME }}'
    option password '${{ github.event.inputs.PPPoE_PASSWORD }}'
WANCONF
        else
          cat >> files/etc/config/network << WANCONF
config interface 'wan'
    option device '${{ github.event.inputs.WAN_IFACE || 'eth0' }}'
    option proto 'dhcp'
WANCONF
        fi

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a 2>&1 || true
        ./scripts/feeds install -a 2>&1 || true

    - name: Install packages
      run: |
        cd openwrt
        chmod +x $GITHUB_WORKSPACE/scripts/diy-part2.sh 2>/dev/null || true
        $GITHUB_WORKSPACE/scripts/diy-part2.sh 2>&1 || true

    - name: Generate .config
      run: |
        cd openwrt
        cat > .config << CONFIGEND
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_Generic=y
CONFIG_TARGET_PROFILE="GENERIC"
CONFIG_TARGET_ALL_PROFILES=y
CONFIG_TARGET_PER_DEVICE_ROOTFS=y
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_TARGET_ROOTFS_EXT4FS=y
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-compat=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-i18n-admin-zh-cn=y
CONFIG_PACKAGE_kmod-usb-core=y
CONFIG_PACKAGE_kmod-usb2=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-storage-uas=n
CONFIG_PACKAGE_automount=n
CONFIG_PACKAGE_kmod-sata-ahci=y
CONFIG_PACKAGE_kmod-ahci=y
CONFIG_PACKAGE_kmod-libata=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_kmod-fs-ntfs=y
CONFIG_PACKAGE_kmod-fuse=y
CONFIGEND
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "date=$(date '+%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

    - name: Check space usage
      run: df -hT

    - name: Organize files
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload firmware
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success'
      with:
        name: ImmortalWrt-${{ steps.compile.outputs.date }}
        path: ${{ env.FIRMWARE_PATH }}
