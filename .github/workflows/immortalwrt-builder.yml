#=================================================
# https://github.com/immortalwrt/immortalwrt
# Description: Build ImmortalWrt with GitHub Actions
# From: P3TERX/Actions-OpenWrt
#=================================================

name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      PPPoE_ENABLE:
        description: 'Enable PPPoE'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      PPPoE_USERNAME:
        description: 'PPPoE Username'
        required: false
        default: ''
      PPPoE_PASSWORD:
        description: 'PPPoE Password'
        required: false
        default: ''
      TARGET_PROFILE:
        description: 'Target Profile'
        required: false
        default: 'x86-64'
        type: choice
        options:
          - x86-64
          - x86-generic
          - armvirt-64
          - rockchip-armv8
          - mediatek-filogic
      CPU_ARCH:
        description: 'CPU Architecture'
        required: false
        default: 'x86-64'
        type: choice
        options:
          - x86-64
          - x86-generic
          - arm64
      WAN_IFACE:
        description: 'WAN Interface'
        required: false
        default: 'eth0'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3
      LAN_IFACE:
        description: 'LAN Interface'
        required: false
        default: 'eth1'
        type: choice
        options:
          - eth0
          - eth1
          - eth2
          - eth3

  schedule:
    - cron: 0 19 * * *

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: .config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y $(curl -fsSL https://git.io/depends-ubuntu-2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        git config --global user.name "OpenWrt Builder"
        git config --global user.email "builder@github.com"

    - name: Clone source code
      run: |
        df -hT $GITHUB_WORKSPACE
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P1_SH $DIY_P2_SH
        # Convert line endings
        sed -i 's/\r$//' $DIY_P1_SH $DIY_P2_SH 2>/dev/null || true
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        ./scripts/feeds install -a 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true

    - name: Install custom packages
      run: |
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Apply network configuration
      run: |
        cd openwrt
        WAN_IFACE="${{ github.event.inputs.WAN_IFACE || 'eth0' }}"
        LAN_IFACE="${{ github.event.inputs.LAN_IFACE || 'eth1' }}"
        PPPoE_ENABLE="${{ github.event.inputs.PPoE_ENABLE || 'false' }}"
        PPPoE_USERNAME="${{ github.event.inputs.PPPoE_USERNAME }}"
        PPPoE_PASSWORD="${{ github.event.inputs.PPPoE_PASSWORD }}"
        
        cat > package/base-files/files/etc/config/network <<EOF
        config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'
            option netmask '255.0.0.0'

        config interface 'lan'
            option device '${LAN_IFACE}'
            option proto 'static'
            option ipaddr '192.168.1.1'
            option netmask '255.255.255.0'
            option ip6assign '60'
            option dns '223.5.5.5 114.114.114.114'
        EOF
        
        if [ "$PPPoE_ENABLE" = "true" ] && [ -n "$PPPoE_USERNAME" ] && [ -n "$PPPoE_PASSWORD" ]; then
          cat >> package/base-files/files/etc/config/network <<EOF
        config interface 'wan'
            option device '${WAN_IFACE}'
            option proto 'pppoe'
            option username '${PPPoE_USERNAME}'
            option password '${PPPoE_PASSWORD}'
        EOF
        else
          cat >> package/base-files/files/etc/config/network <<EOF
        config interface 'wan'
            option device '${WAN_IFACE}'
            option proto 'dhcp'
        EOF
        fi

    - name: Generate .config
      run: |
        cd openwrt
        cat > .config <<EOF
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_Generic=y
        CONFIG_TARGET_PROFILE="GENERIC"
        CONFIG_TARGET_ALL_PROFILES=y
        CONFIG_TARGET_PER_DEVICE_ROOTFS=y
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_TARGET_ROOTFS_EXT4FS=y
        
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_PACKAGE_luci-i18n-admin-zh-cn=y
        
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-storage-uas=n
        CONFIG_PACKAGE_automount=n
        
        CONFIG_PACKAGE_kmod-sata-ahci=y
        CONFIG_PACKAGE_kmod-ahci=y
        CONFIG_PACKAGE_kmod-libata=y
        
        CONFIG_PACKAGE_v2ray-geosite=y
        CONFIG_PACKAGE_v2ray-geoip=y
        CONFIG_PACKAGE_chinadns-ng=y
        
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-openclash=y
        CONFIG_PACKAGE_luci-app-adguardhome=y
        CONFIG_PACKAGE_luci-app-tailscale=y
        CONFIG_PACKAGE_luci-app-dockerman=y
        CONFIG_PACKAGE_luci-app-filebrowser=y
        CONFIG_PACKAGE_luci-app-sqm=y
        CONFIG_PACKAGE_ttyd=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_luci-app-diskman=y
        CONFIG_PACKAGE_luci-app-lxc=y
        CONFIG_PACKAGE_luci-app-ksmbd=y
        CONFIG_PACKAGE_luci-app-qbittorrent=y
        CONFIG_PACKAGE_luci-app-vlmcsd=y
        CONFIG_PACKAGE_luci-app-filemanager=y
        CONFIG_PACKAGE_luci-app-daed=y
        EOF
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "date=$(date '+%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
        echo "FIRMWARE_PATH=$(cd bin/targets/*/* && pwd)" >> $GITHUB_OUTPUT

    - name: Check space usage
      run: df -hT

    - name: Organize files
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload firmware to artifact
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: ImmortalWrt-${{ env.VERSION }}-${{ github.event.inputs.CPU_ARCH || 'x86-64' }}-${{ steps.compile.outputs.date }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Create release
      id: release
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: ImmortalWrt ${{ steps.compile.outputs.date }}
        tag: ${{ steps.compile.outputs.date }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
        artifacts: ${{ env.FIRMWARE_PATH }}/*.img.gz,${{ env.FIRMWARE_PATH }}/*.iso

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@v0.3.2
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
